name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - prod

env:
  REGISTRY: ghcr.io
  APP_DIR: photo-gallery-manager-be

jobs:
  ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: photo-gallery-manager-be

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: photo-gallery-manager-be/package-lock.json

      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test --if-present
      - run: npm run build --if-present

  docker:
    runs-on: ubuntu-latest
    needs: ci

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.vars.outputs.image }}
      tag: ${{ steps.vars.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image variables
        id: vars
        run: |
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            TAG="dev-latest"
          else
            TAG="prod-latest"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.REGISTRY }}/${OWNER}/photo-gallery-manager-be:${TAG}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.tag }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./photo-gallery-manager-be
          file: ./photo-gallery-manager-be/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy_dev:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy DEV
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            IMAGE="${{ needs.docker.outputs.image }}"
            CONTAINER="photo-gallery-manager-be-dev"
            ENV_FILE="$HOME/photo-gallery-manager-be-dev/.env"
            REQUIRED_VARS=("PORT" "FRONTEND_URL" "MONGO_URI" "JWT_SECRET" "JWT_REMEMBER_SECRET" "AWS_REGION" "AWS_ACCESS_KEY_ID" "AWS_SECRET_ACCESS_KEY" "S3_BUCKET_NAME")
            GHCR_USER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"

            if [[ ! -f "$ENV_FILE" ]]; then
              echo "Missing env file: $ENV_FILE"
              exit 1
            fi

            for KEY in "${REQUIRED_VARS[@]}"; do
              VALUE="$(grep -E "^${KEY}=" "$ENV_FILE" | tail -n 1 | cut -d '=' -f2-)"
              if [[ -z "$VALUE" ]]; then
                echo "Missing required variable in $ENV_FILE: $KEY"
                exit 1
              fi
            done

            PORT="$(grep -E '^PORT=' "$ENV_FILE" | tail -n 1 | cut -d '=' -f2-)"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            docker pull "$IMAGE"
            docker rm -f "$CONTAINER" || true

            docker run -d \
              --name "$CONTAINER" \
              --env-file "$ENV_FILE" \
              --restart unless-stopped \
              -p "${PORT}:${PORT}" \
              "$IMAGE"

  deploy_prod:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/prod'

    steps:
      - name: Deploy PROD
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            IMAGE="${{ needs.docker.outputs.image }}"
            CONTAINER="photo-gallery-manager-be-prod"
            ENV_FILE="$HOME/photo-gallery-manager-be-prod/.env"
            REQUIRED_VARS=("PORT" "FRONTEND_URL" "MONGO_URI" "JWT_SECRET" "JWT_REMEMBER_SECRET" "AWS_REGION" "AWS_ACCESS_KEY_ID" "AWS_SECRET_ACCESS_KEY" "S3_BUCKET_NAME")
            GHCR_USER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"

            if [[ ! -f "$ENV_FILE" ]]; then
              echo "Missing env file: $ENV_FILE"
              exit 1
            fi

            for KEY in "${REQUIRED_VARS[@]}"; do
              VALUE="$(grep -E "^${KEY}=" "$ENV_FILE" | tail -n 1 | cut -d '=' -f2-)"
              if [[ -z "$VALUE" ]]; then
                echo "Missing required variable in $ENV_FILE: $KEY"
                exit 1
              fi
            done

            PORT="$(grep -E '^PORT=' "$ENV_FILE" | tail -n 1 | cut -d '=' -f2-)"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            docker pull "$IMAGE"
            docker rm -f "$CONTAINER" || true

            docker run -d \
              --name "$CONTAINER" \
              --env-file "$ENV_FILE" \
              --restart unless-stopped \
              -p "${PORT}:${PORT}" \
              "$IMAGE"
